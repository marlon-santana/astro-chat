version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: astro_chat_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astro_chat_app
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - qdrant
    environment:
      - NODE_ENV=production
      - PORT=3001
      - USE_QDRANT=true
      - QDRANT_URL=http://qdrant:6333
      - SQLITE_DB_PATH=/app/data/metadata.sqlite
      - COHERE_API_KEY=${COHERE_API_KEY}
    volumes:
      - ./data:/app/data

networks:
  default:
    name: astro_chat_net
